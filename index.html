<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>=== 终端连线中 ===</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #00ff00; /* 经典终端绿 */
            --bg-color: #0a0a0a;
            --border-color: #00ff00;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: var(--bg-color);
            color: var(--primary-color);
            font-family: 'Press Start 2P', monospace; /* 强制使用像素字体 */
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* 模拟 CRT 显示器的扫描线效果 */
        .crt::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        .game-container {
            position: relative;
            z-index: 1;
            width: 80%;
            max-width: 800px;
            border: 4px solid var(--border-color);
            padding: 40px;
            text-align: center;
            box-shadow: 0 0 20px var(--primary-color), inset 0 0 20px var(--primary-color); /* 霓虹发光效果 */
            background-color: rgba(0, 20, 0, 0.8);
        }

        h1 {
            font-size: 24px;
            margin-bottom: 30px;
            text-shadow: 2px 2px 0px #000, 4px 4px 0px rgba(0, 255, 0, 0.5);
            letter-spacing: 2px;
        }

        .stats-box {
            text-align: left;
            margin: 0 auto 40px auto;
            width: 80%;
            border: 2px dashed var(--border-color);
            padding: 20px;
            line-height: 2;
            font-size: 12px;
        }

        .bar {
            display: inline-block;
            background-color: var(--primary-color);
            color: #000;
            padding: 0 5px;
        }

        .menu {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }

        .btn {
            background: transparent;
            color: var(--primary-color);
            border: 2px solid var(--primary-color);
            padding: 15px 30px;
            font-family: 'Press Start 2P', monospace;
            font-size: 14px;
            cursor: pointer;
            width: 250px;
            transition: all 0.2s;
            text-transform: uppercase;
        }

        .btn:hover {
            background-color: var(--primary-color);
            color: var(--bg-color);
            box-shadow: 0 0 15px var(--primary-color);
            transform: scale(1.05); /* 悬停时轻微放大 */
        }

        /* 闪烁的提示符 */
        .cursor {
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* 响应式设计：在小屏幕上缩小字体 */
        @media (max-width: 600px) {
            h1 { font-size: 16px; }
            .btn { width: 100%; font-size: 10px; }
            .stats-box { font-size: 10px; width: 90%; }
        }
    </style>
</head>
<body class="crt">

    <div class="game-container">
        <h1>> SYSTEM READY_</h1>
        
        <div class="stats-box">
            <div>USER: PLAYER_1</div>
            <div>CLASS: CYBER_HACKER</div>
            <div>LVL : 99</div>
            <div>HP  : [<span class="bar">||||||||||||||||</span>] 100%</div>
            <div>MP  : [<span class="bar">||||||||        </span>] 50%</div>
            <div>LOC : SECTOR_7G</div>
        </div>

        <div class="menu">
            <button class="btn">> START GAME</button>
            <button class="btn">> LOAD SAVE</button>
            <button class="btn">> OPTIONS</button>
        </div>
        
        <div style="margin-top: 30px; font-size: 10px;">
            INSERT COIN TO CONTINUE <span class="cursor">_</span>
        </div>
    </div>

</body>
</html>
